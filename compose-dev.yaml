version: '3'

networks:
  umcunet:

volumes:
  pgdata:
  grafana:

services:

  db:
    image: postgres:16.1-bookworm
    # These values must match the corresponding values in the app service.
    #   It is highly recommended you change the password and username.
    environment:
      - POSTGRES_PASSWORD=ChangeMe
      - POSTGRES_USER=umcu
      - POSTGRES_DB=umcu
    expose:
      - 5432
    networks:
      - umcunet
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    expose:
      - 9090
    networks:
      - umcunet
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    networks:
      - umcunet
    volumes:
      - ./grafana:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  app:
    build: .
    # These values must match the corresponding values in the db service.
    environment:
      - POSTGRES_PASSWORD=ChangeMe
      - POSTGRES_USER=umcu
      - POSTGRES_DB=umcu
    # Change the port on the left side to change the port used on your host machine.
    ports:
      - "8080:8080"
    networks:
      - umcunet
    depends_on:
      - db
      - grafana
    restart: unless-stopped
