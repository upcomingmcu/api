# This Docker Compose configuration is set up for a development environment.
# *Do not* use this in production.
#
# Start the Docker container with:
#   docker compose -f compose-dev.yaml up -d

version: '3'

networks:
  umcunet:

volumes:
  pgdata:
  grafana:

services:
  #
  # The PostgreSQL database service.
  #
  db:
    image: postgres:16.1-bookworm
    # These variables must match their corresponding variables in the 'app' service.
    #   It is highly recommended you change all three of these values to keep your database secure.
    environment:
      - POSTGRES_PASSWORD=ChangeMe
      - POSTGRES_USER=umcu
      - POSTGRES_DB=umcu
    expose:
      - 5432 # Do not change this
    networks:
      - umcunet
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: unless-stopped
  #
  # The metrics collection service.
  #   This service will not be publicly accessible, please use Grafana for that.
  #   Please change the username and password in 'prometheus.yml'.
  #     See: https://prometheus.io/docs/guides/basic-auth/
  #     Default password is "ChangeMe"
  #
  prometheus:
    image: prom/prometheus
    expose:
      - 9090 # Do not change this
    networks:
      - umcunet
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
  #
  # The metrics visualization service.
  #
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000" # Change the port on the left side to change which port is used on your host machine.
    networks:
      - umcunet
    volumes:
      - ./grafana:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
  #
  # The UMCU API application service.
  #
  app:
    build: .
    # The "POSTGRES_*" variables must match their corresponding variables in the 'db' service.
    environment:
      - POSTGRES_PASSWORD=ChangeMe
      - POSTGRES_USER=umcu
      - POSTGRES_DB=umcu
      - RATE_LIMIT=100 # How many requests allowed per minute
    ports:
      - "8080:8080" # Change the port on the left side to change which port is used on your host machine.
    networks:
      - umcunet
    depends_on:
      - db
      - grafana
    restart: unless-stopped
